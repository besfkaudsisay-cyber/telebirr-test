<!DOCTYPE html>
<html>
<head>
  <title>Telebirr Demo</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      padding-top: 50px;
    }
    .card {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }
    h1 {
      color: green;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Telebirr Payment</h1>

  <input type="text" placeholder="Enter phone number">
  <input type="number" placeholder="Enter amount">

  <button onclick="pay()">Pay Now</button>

  <p id="msg"></p>
</div>

<script>
function pay() {
  document.getElementById("msg").innerHTML =
    "Payment request sent (simulation) 👍";
}
</script>

</body>
</html>
